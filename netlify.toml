# netlify.toml — app.osilashani.com
# Pre-built app — no build step

[build]
  publish = "."
  command = "echo done"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[functions."scheduled-push"]
  schedule = "0 * * * *"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
